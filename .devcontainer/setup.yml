---
- name: Configure Dev Container
  hosts: localhost
  connection: local
  become: true

  vars:
    nvm_version: "{{ lookup('env', 'NVM_VERSION') }}"
    node_version: "{{ lookup('env', 'NODE_VERSION') }}"
    username: "{{ lookup('env', 'USERNAME') }}"
    user_uid: "{{ lookup('env', 'USER_UID') | default('1000', true) }}"
    user_gid: "{{ lookup('env', 'USER_GID') | default('1000', true) }}"
    user_home: "/home/{{ username }}"
    bashrc_additions_d: .bashrc.additions.d

  tasks:
    - name: Basic setup
      ansible.builtin.include_tasks: default_tasks/basic_setup.yml

    - name: Find dynamic task files
      ansible.builtin.find:
        paths: "{{ playbook_dir }}/tasks"
        patterns: "*.yml"
        excludes:
          - "basic_setup.yml"
          - "basic_setup_post.yml"
      register: found_tasks

    - name: Run dynamic task files
      ansible.builtin.include_tasks: "{{ item }}"
      loop: "{{ found_tasks.files | map(attribute='path') | sort }}"

    - name: Post setup
      ansible.builtin.include_tasks: default_tasks/basic_setup_post.yml
